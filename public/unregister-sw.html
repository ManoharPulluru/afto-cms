<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clear Service Worker</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 80px auto; padding: 0 24px; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #0d9488; color: white; border: none; border-radius: 8px; }
    #status { margin-top: 16px; color: #333; }
  </style>
</head>
<body>
  <h1>Clear stale service worker</h1>
  <p>If localhost:3000 shows blank pages or 404 errors for CSS/JS, click below then reload the storefront.</p>
  <button type="button" id="clear">Clear &amp; reload</button>
  <p id="status"></p>
  <script>
    document.getElementById('clear').onclick = async () => {
      const status = document.getElementById('status');
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
          status.textContent = 'Unregistered ' + regs.length + ' service worker(s).';
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
          status.textContent += ' Cleared ' + keys.length + ' cache(s).';
        }
        setTimeout(() => { window.location.href = '/'; }, 1500);
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
      }
    };
  </script>
</body>
</html>
