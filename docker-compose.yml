services:
  postgres:
    image: postgres:16-alpine
    container_name: afto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload123
      POSTGRES_DB: afto_storefront
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payload -d afto_storefront']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
